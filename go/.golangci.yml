run:
  timeout: 5m
  skip-dirs:
    - vendor
  skip-files:
    - ".*_test.go"

linters:
  enable:
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unused
    - gosimple
    - staticcheck
  disable:
    - errcheck

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
